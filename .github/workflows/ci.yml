name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Two classes of job here:
#
#   - "bot-aware" (typecheck, test): the editor's `@bot/*` path alias
#     resolves to `../azalea/src/*`, and the bot's runtime deps (zod,
#     typed-regex, discord.js, lodash) need to install for TypeScript
#     and Bun to resolve types and runtime imports. These jobs check
#     out the bot repo as a sibling.
#
#   - "bot-free" (build, audit, actionlint): the UI tsconfig and the
#     audit/lint commands don't reach into the bot tree. Skipping the
#     cross-checkout keeps the supply-chain surface of these jobs
#     small — a compromise in the bot repo can't leak into them.
#
# `working-directory: ./azalea-editor` is set per-job (rather than
# globally) so bot-free jobs can check out at the workspace root.

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./azalea-editor
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: azalea-editor
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: Rodis-Infrastructure/Azalea
          path: azalea
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ./azalea-editor/.bun-version

      - name: Install Editor Dependencies
        run: bun install --frozen-lockfile
      - name: Install Bot Dependencies
        working-directory: ./azalea
        run: bun install --frozen-lockfile
      - name: Type Check
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./azalea-editor
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: azalea-editor
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: Rodis-Infrastructure/Azalea
          path: azalea
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ./azalea-editor/.bun-version

      - name: Install Editor Dependencies
        run: bun install --frozen-lockfile
      - name: Install Bot Dependencies
        working-directory: ./azalea
        run: bun install --frozen-lockfile
      - name: Run Tests
        run: bun run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ./.bun-version

      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Build UI
        run: bun run build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ./.bun-version

      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Audit Dependencies
        run: bun audit --audit-level high

  actionlint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run actionlint
        run: >
          docker run --rm -v "$PWD:/repo" -w /repo
          rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
          -color
